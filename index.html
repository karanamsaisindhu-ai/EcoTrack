<!DOCTYPE html>
<html>
<head>
    <title>EcoTrack</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🌱 EcoTrack</h1>
        <p>Track your daily eco-friendly activities</p>
	<p>Total activities: <span id="count">0</span></p>

        <input type="text" id="activity" placeholder="Enter eco activity">
        <br><br>

        <button onclick="addActivity()">Add Activity</button>

        <ul id="list"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
